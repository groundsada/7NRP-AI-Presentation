<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>T-Rex eating an apple</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: linear-gradient(180deg, #ffe9b3 0%, #ffc78a 60%, #c87a3d 100%);
    font-family: ui-sans-serif, system-ui, sans-serif;
    color: #2c1810;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  svg { width: min(80vw, 720px); height: auto; filter: drop-shadow(0 14px 28px rgba(0,0,0,0.25)); }
  h1 { font-size: 1.5rem; font-weight: 600; margin: 1rem 0 0.25rem; letter-spacing: -0.01em; }
  p  { font-size: 0.9rem; margin: 0; opacity: 0.7; }
  .ground {
    width: 100%;
    height: 26%;
    position: absolute;
    bottom: 0;
    background: linear-gradient(180deg, #b86a2e 0%, #7e431a 100%);
    z-index: 0;
  }
  .scene { position: relative; z-index: 1; }
  @keyframes chomp {
    0%, 100% { transform: rotate(0deg); }
    50%      { transform: rotate(-8deg); }
  }
  .jaw { transform-origin: 480px 230px; animation: chomp 1.6s ease-in-out infinite; }
  @keyframes blink {
    0%, 92%, 100% { transform: scaleY(1); }
    95%, 99%      { transform: scaleY(0.1); }
  }
  .eye-lid { transform-origin: 510px 168px; animation: blink 4s ease-in-out infinite; }
</style>
</head>
<body>
  <div class="ground"></div>
  <div class="scene">
    <svg viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg" aria-label="T-rex eating an apple">

      <!-- body -->
      <path d="M 100 280
               Q 90 230 130 200
               Q 160 170 210 175
               Q 260 178 310 195
               Q 360 210 400 215
               L 460 218
               L 470 200
               Q 490 170 520 175
               Q 550 180 555 210
               Q 560 235 540 250
               L 530 260
               Q 540 270 535 285
               Q 520 305 490 305
               L 350 305
               Q 290 305 250 320
               L 245 340
               Q 240 355 225 355
               L 210 355
               Q 200 355 200 345
               L 200 320
               Q 170 320 145 310
               L 140 350
               Q 138 360 125 360
               L 110 360
               Q 100 360 100 350
               Z"
            fill="#4a8d4a" stroke="#2d5a2d" stroke-width="3" stroke-linejoin="round"/>

      <!-- belly highlight -->
      <path d="M 160 270
               Q 200 290 260 290
               Q 320 290 380 280"
            fill="none" stroke="#86c186" stroke-width="6" stroke-linecap="round" opacity="0.7"/>

      <!-- back stripes -->
      <path d="M 170 195 q 8 -10 16 0" stroke="#2d5a2d" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M 220 188 q 8 -10 16 0" stroke="#2d5a2d" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M 270 192 q 8 -10 16 0" stroke="#2d5a2d" stroke-width="3" fill="none" stroke-linecap="round"/>

      <!-- tiny arms -->
      <path d="M 280 240 q 10 18 18 22 q 4 2 6 -2 l -4 -8 l 6 -2"
            fill="#4a8d4a" stroke="#2d5a2d" stroke-width="3" stroke-linejoin="round"/>

      <!-- legs (back) -->
      <path d="M 145 295 q -10 30 -2 60 l 28 0 q 6 0 6 -8 l 0 -52 z"
            fill="#3d7a3d" stroke="#2d5a2d" stroke-width="3" stroke-linejoin="round"/>
      <!-- legs (front) -->
      <path d="M 215 305 q -8 30 0 55 l 26 0 q 6 0 6 -8 l 0 -50 z"
            fill="#4a8d4a" stroke="#2d5a2d" stroke-width="3" stroke-linejoin="round"/>

      <!-- toes -->
      <g stroke="#2d5a2d" stroke-width="2" fill="#2d5a2d">
        <circle cx="148" cy="357" r="3"/>
        <circle cx="160" cy="358" r="3"/>
        <circle cx="172" cy="357" r="3"/>
        <circle cx="218" cy="358" r="3"/>
        <circle cx="230" cy="359" r="3"/>
        <circle cx="242" cy="358" r="3"/>
      </g>

      <!-- tail -->
      <path d="M 105 280
               Q 60 270 35 240
               Q 18 215 30 205
               Q 45 200 70 220
               Q 95 240 110 260 Z"
            fill="#4a8d4a" stroke="#2d5a2d" stroke-width="3" stroke-linejoin="round"/>

      <!-- head + upper jaw (static) -->
      <path d="M 470 200
               Q 465 165 495 150
               Q 540 132 580 145
               Q 620 158 615 195
               L 600 205
               Q 590 215 575 215
               L 480 218
               Q 472 210 470 200 Z"
            fill="#4a8d4a" stroke="#2d5a2d" stroke-width="3" stroke-linejoin="round"/>

      <!-- upper teeth -->
      <path d="M 490 215 l 5 8 l 5 -8 M 510 217 l 5 8 l 5 -8 M 530 218 l 5 8 l 5 -8 M 550 217 l 5 8 l 5 -8 M 570 215 l 5 8 l 5 -8"
            fill="#fff" stroke="#fff" stroke-width="3" stroke-linejoin="round"/>

      <!-- lower jaw (animated) -->
      <g class="jaw">
        <path d="M 480 222
                 Q 475 240 500 248
                 Q 540 256 580 250
                 Q 605 245 600 230
                 L 575 230
                 L 480 222 Z"
              fill="#3d7a3d" stroke="#2d5a2d" stroke-width="3" stroke-linejoin="round"/>
        <!-- lower teeth -->
        <path d="M 500 240 l 4 -7 l 4 7 M 520 244 l 4 -7 l 4 7 M 540 246 l 4 -7 l 4 7 M 560 245 l 4 -7 l 4 7"
              fill="#fff" stroke="#fff" stroke-width="3" stroke-linejoin="round"/>
      </g>

      <!-- eye -->
      <circle cx="510" cy="168" r="9" fill="#fff" stroke="#2d5a2d" stroke-width="2"/>
      <circle cx="513" cy="170" r="4.5" fill="#0e1430"/>
      <circle cx="514.5" cy="168.5" r="1.5" fill="#fff"/>
      <ellipse class="eye-lid" cx="510" cy="168" rx="10" ry="10" fill="#4a8d4a"/>

      <!-- nostril -->
      <circle cx="600" cy="178" r="2.5" fill="#2d5a2d"/>

      <!-- apple — half eaten, just to the right of the snout -->
      <g transform="translate(595, 215)">
        <!-- bite arc (cut) -->
        <path d="M 5 -6
                 Q -8 -2 -10 12
                 Q -10 26 0 32
                 Q 12 36 22 32
                 Q 32 26 32 12
                 Q 32 -2 18 -6
                 Q 14 0 12 8
                 Q 8 8 5 -6 Z"
              fill="#e0413a" stroke="#7a1f1c" stroke-width="2" stroke-linejoin="round"/>
        <!-- highlight -->
        <path d="M -2 6 Q 0 12 4 14"
              fill="none" stroke="#ffb1ad" stroke-width="3" stroke-linecap="round"/>
        <!-- stem -->
        <path d="M 12 -6 q 1 -8 6 -10" stroke="#5a3a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- leaf -->
        <path d="M 18 -16 q 8 -2 10 4 q -6 4 -10 -4 Z" fill="#3d8b3d" stroke="#2d5a2d" stroke-width="1.5"/>
      </g>

      <!-- crumbs / bite specks -->
      <g fill="#7a1f1c">
        <circle cx="585" cy="240" r="1.6"/>
        <circle cx="592" cy="246" r="1.2"/>
        <circle cx="578" cy="248" r="1.4"/>
      </g>
    </svg>
    <h1>T-Rex eats an apple</h1>
    <p>pre-baked fallback · same prompt, run earlier</p>
  </div>
</body>
</html>
